<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | twist_.tie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = tailwind.config || {};
      tailwind.config.theme = Object.assign(tailwind.config.theme || {}, { extend: { colors: { blush: '#F8BBD0', rosegold: '#C98A8A', ink: '#2F2A2A', cream: '#FFF8FB' }, fontFamily: { sans: ['Poppins','sans-serif'], display: ['Montserrat','sans-serif'] } } });
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              blush: '#F8BBD0',
              rosegold: '#C98A8A',
              ink: '#2F2A2A',
              cream: '#FFF8FB'
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              display: ['Montserrat', 'sans-serif']
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body class="bg-cream text-ink">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
      <div class="w-full max-w-md rounded-[2rem] border border-pink-100 bg-white p-8 shadow-soft">
        <p class="text-sm font-semibold uppercase tracking-[0.3em] text-rosegold">Admin Access</p>
        <h1 class="mt-3 font-display text-3xl font-semibold text-ink">Secure dashboard login</h1>
        <form class="mt-6 space-y-4">
          <input type="email" placeholder="Admin Email" class="w-full rounded-full border border-pink-200 bg-cream px-4 py-3" required />
          <input type="password" placeholder="Password" class="w-full rounded-full border border-pink-200 bg-cream px-4 py-3" required />
          <button class="w-full rounded-full bg-blush px-4 py-3 font-semibold text-white transition hover:bg-rosegold">Login</button>
        </form>
      </div>
    </main>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
