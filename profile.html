<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | twist_.tie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = tailwind.config || {};
      tailwind.config.theme = Object.assign(tailwind.config.theme || {}, { extend: { colors: { blush: '#F8BBD0', rosegold: '#C98A8A', ink: '#2F2A2A', cream: '#FFF8FB' }, fontFamily: { sans: ['Poppins','sans-serif'], display: ['Montserrat','sans-serif'] } } });
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              blush: '#F8BBD0',
              rosegold: '#C98A8A',
              ink: '#2F2A2A',
              cream: '#FFF8FB'
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              display: ['Montserrat', 'sans-serif']
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body class="bg-cream text-ink">
    <main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
      <div class="rounded-[2rem] border border-pink-100 bg-white p-8 shadow-soft">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-sm font-semibold uppercase tracking-[0.3em] text-rosegold">My Profile</p>
            <h1 class="mt-2 font-display text-3xl font-semibold text-ink">Edit your personal details</h1>
          </div>
          <div class="flex h-16 w-16 items-center justify-center rounded-full bg-blush text-2xl font-semibold text-white">M</div>
        </div>
        <form class="mt-8 grid gap-4 md:grid-cols-2">
          <input type="text" placeholder="Full Name" class="rounded-full border border-pink-200 bg-cream px-4 py-3" />
          <input type="email" placeholder="Email" class="rounded-full border border-pink-200 bg-cream px-4 py-3" />
          <input type="tel" placeholder="Phone" class="rounded-full border border-pink-200 bg-cream px-4 py-3" />
          <input type="text" placeholder="Address" class="rounded-full border border-pink-200 bg-cream px-4 py-3" />
          <button class="rounded-full bg-blush px-5 py-3 font-semibold text-white transition hover:bg-rosegold md:col-span-2">Save Changes</button>
        </form>
      </div>
    </main>
      <script src="assets/js/main.js"></script>
  </body>
</html>
