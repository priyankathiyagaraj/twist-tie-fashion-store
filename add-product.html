<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Product | twist_.tie</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = tailwind.config || {};
      tailwind.config.theme = Object.assign(tailwind.config.theme || {}, { extend: { colors: { blush: '#F8BBD0', rosegold: '#C98A8A', ink: '#2F2A2A', cream: '#FFF8FB' }, fontFamily: { sans: ['Poppins','sans-serif'], display: ['Montserrat','sans-serif'] } } });
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind = window.tailwind || {};
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              blush: '#F8BBD0',
              rosegold: '#C98A8A',
              ink: '#2F2A2A',
              cream: '#FFF8FB'
            },
            fontFamily: {
              sans: ['Poppins', 'sans-serif'],
              display: ['Montserrat', 'sans-serif']
            }
          }
        }
      };
    </script>
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body class="bg-cream text-ink">
    <main class="mx-auto max-w-5xl px-4 py-10 sm:px-6 lg:px-8">
      <div class="rounded-[2rem] border border-pink-100 bg-white p-8 shadow-soft">
        <h1 class="font-display text-3xl font-semibold text-ink">Add New Product</h1>
        <form class="mt-6 space-y-4">
          <input type="text" placeholder="Product Name" class="w-full rounded-full border border-pink-200 bg-cream px-4 py-3" required />
          <textarea placeholder="Description" class="min-h-[120px] w-full rounded-[1.25rem] border border-pink-200 bg-cream px-4 py-3" required></textarea>
          <input type="number" placeholder="Price" class="w-full rounded-full border border-pink-200 bg-cream px-4 py-3" required />
          <input type="text" placeholder="Category" class="w-full rounded-full border border-pink-200 bg-cream px-4 py-3" required />
          <button class="rounded-full bg-blush px-5 py-3 font-semibold text-white transition hover:bg-rosegold">Save Product</button>
        </form>
      </div>
    </main>
    <script src="../assets/js/main.js"></script>
  </body>
</html>
